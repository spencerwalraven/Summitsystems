<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1914"/>
      <stop offset="1" stop-color="#0A0908"/>
    </linearGradient>
    <linearGradient id="gs" x1="10" y1="9" x2="34" y2="35" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AA70"/>
      <stop offset="1" stop-color="#9A7040"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="44" height="44" rx="10" fill="url(#gbg)"/>
  <!-- Subtle gold border -->
  <rect x="0.75" y="0.75" width="42.5" height="42.5" rx="9.5" stroke="url(#gs)" stroke-width="0.75" stroke-opacity="0.4"/>
  <!-- S mark: 3 horizontal bars + 2 side connectors -->
  <!-- Top bar (full width) -->
  <rect x="10" y="9" width="24" height="5" rx="1.5" fill="url(#gs)"/>
  <!-- Right connector: top bar down to middle bar -->
  <rect x="29" y="13" width="5" height="7" fill="url(#gs)"/>
  <!-- Middle bar (full width) -->
  <rect x="10" y="19" width="24" height="5" fill="url(#gs)"/>
  <!-- Left connector: middle bar down to bottom bar -->
  <rect x="10" y="23" width="5" height="8" fill="url(#gs)"/>
  <!-- Bottom bar (full width) -->
  <rect x="10" y="30" width="24" height="5" rx="1.5" fill="url(#gs)"/>
</svg>
